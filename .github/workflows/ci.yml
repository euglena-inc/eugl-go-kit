name: CI

on:
  push:
    branches:
      - main
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"

      - name: Download dependencies
        run: go mod download

      - name: Format check
        run: |
          go fmt ./...
          git diff --exit-code

      - name: Test
        run: go test ./...

      - name: Vet
        run: go vet ./...

      - name: Sensitive file check
        run: |
          if {
            git ls-files
            git ls-files --others --exclude-standard
          } | grep -E '(^|/)([^/]+\.(pem|key|p12|pfx)|\.env)$' >/dev/null; then
            echo "发现禁止提交的敏感文件"
            exit 1
          fi
